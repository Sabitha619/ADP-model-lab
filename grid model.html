<!DOCTYPE html>
<html>
<head>
<style>

.container {
  display: grid;
  grid-template-areas:
    "header head"
    "menu content"
    "footer footer";
  grid-template-columns: 1fr 3fr;
  border: 3px solid black;
}

/* All boxes */
.container div {
  border: 3px solid black;
  padding: 15px;
}

/* Sections */
.header {
  grid-area: header;
  text-align: center;
  font-size: 28px;
  background-color: palevioletred;
  grid-column:1/-1;
}

.menu {
  grid-area: menu;
  background-color: coral;
}

.content {
  grid-area: content;
  background-color: coral;
}

.footer {
  grid-area: footer;
  text-align: center;
  font-size: 22px;
  background-color: palevioletred;
}

</style>
</head>

<body>
<div class="container">

  <div class="header">Queen of spices</div>

 <div class="menu">
  <a href="#">Link 1</a><br><br>
    <a href="#">Link 2</a><br><br>
    <a href="#">Link 3</a>
</div>
  <div class="content">
    <h2>Cardamom</h2>
    <p>
      Queen  of species is Cardamom.
      Botanical name:Elettaria cardamomum.
      Hels to reduce cold.
      Act as a mouth freshener,gives pleasant smell.

    </p>
  </div>

  <div class="footer">Footer</div>

</div>

</body>
</html>
